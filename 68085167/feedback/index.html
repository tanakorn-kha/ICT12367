<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มข้อเสนอแนะ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #charCount {
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="mb-4 text-center text-primary">ส่งข้อเสนอแนะ</h2>
        
        <form id="feedbackForm">
            <div class="mb-3">
                <label for="customerName" class="form-label">ชื่อ-นามสกุล</label>
                <input type="text" class="form-control" id="customerName" placeholder="ระบุชื่อของคุณ">
            </div>

            <div class="mb-3">
                <label for="message" class="form-label">ข้อความร้องเรียน/ข้อเสนอแนะ</label>
                <textarea class="form-control" id="message" rows="5" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
                <div class="form-text text-end mt-2">
                    จำนวนตัวอักษร: <span id="charCount">0</span> ตัว
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">ส่งข้อมูล</button>
        </form>
    </div>
</div>

<script>
    const messageInput = document.getElementById('message');
    const charCountDisplay = document.getElementById('charCount');

    messageInput.addEventListener('input', function() {
        const currentLength = messageInput.value.length;
        
        charCountDisplay.textContent = currentLength;

    });

</script>

</body>
</html>
